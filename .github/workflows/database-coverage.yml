name: Fill Seven-Day Betynz Database

on:
  workflow_dispatch:
  schedule:
    - cron: "23 2 * * *"

permissions:
  contents: read

concurrency:
  group: betynz-database-coverage
  cancel-in-progress: false

jobs:
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Import and analyse today plus six days
        env:
          API_BASE: ${{ secrets.BETYNZ_API_BASE_URL }}
          ADMIN_SECRET: ${{ secrets.ADMIN_SYNC_SECRET }}
        run: |
          set -euo pipefail
          BASE="${API_BASE:-https://betynz-api.onrender.com}"
          if [ -z "${ADMIN_SECRET:-}" ]; then
            echo "Missing ADMIN_SYNC_SECRET repository secret."
            exit 1
          fi
          for OFFSET in 0 1 2 3 4 5 6; do
            DATE="$(date -u -d "+${OFFSET} day" +%F)"
            echo "Syncing ${DATE}"
            curl --fail --show-error --silent \
              --retry 2 --retry-all-errors --connect-timeout 20 --max-time 900 \
              -X POST "${BASE%/}/api/admin/run-daily" \
              -H "Content-Type: application/json" \
              -H "x-admin-secret: ${ADMIN_SECRET}" \
              --data "{\"date\":\"${DATE}\"}"
            echo
            sleep 10
          done
