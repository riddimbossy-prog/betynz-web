name: Refresh Betynz Database Board

on:
  workflow_dispatch:
  schedule:
    - cron: "7,37 * * * *"

permissions:
  contents: read

concurrency:
  group: betynz-database-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Refresh today's fixtures, scores and predictions
        env:
          API_BASE: ${{ secrets.BETYNZ_API_BASE_URL }}
          ADMIN_SECRET: ${{ secrets.ADMIN_SYNC_SECRET }}
        run: |
          set -euo pipefail
          BASE="${API_BASE:-https://betynz-api.onrender.com}"
          if [ -z "${ADMIN_SECRET:-}" ]; then
            echo "Missing ADMIN_SYNC_SECRET repository secret."
            exit 1
          fi
          DATE="$(date -u +%F)"
          curl --fail --show-error --silent \
            --retry 3 --retry-all-errors --connect-timeout 20 --max-time 900 \
            -X POST "${BASE%/}/api/admin/refresh-board" \
            -H "Content-Type: application/json" \
            -H "x-admin-secret: ${ADMIN_SECRET}" \
            --data "{\"date\":\"${DATE}\"}"
