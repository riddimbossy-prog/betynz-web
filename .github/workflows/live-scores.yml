name: Update Betynz Live Scores

on:
  workflow_dispatch:
  schedule:
    - cron: "7,22,37,52 * * * *"

permissions:
  contents: write

concurrency:
  group: betynz-live-scores
  cancel-in-progress: true

jobs:
  scores:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Create private score configuration
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          DAYS_BACK: ${{ secrets.DAYS_BACK }}
        run: |
          test -n "$API_FOOTBALL_KEY"
          cat > scripts/config.txt <<EOF_CONFIG
          API_KEY=${API_FOOTBALL_KEY}
          SEASON=$(date -u +%Y)
          DAYS_BACK=${DAYS_BACK:-1}
          EOF_CONFIG
          cp data.js scripts/data.js
      - name: Refresh match scores
        working-directory: scripts
        run: node fetch-scores.js
      - name: Rebuild record and snapshot
        run: node scripts/build-snapshot.js
      - name: Validate generated product
        run: node scripts/validate-product.js
      - name: Remove private runtime file
        if: always()
        run: rm -f scripts/config.txt
      - name: Commit score and record changes
        run: |
          git config user.name "Betynz Live Bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.js api-status.json prediction-locks.json results-history.json scripts/data.js
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Update Betynz live scores and record"
          git pull --rebase
          git push
