name: Deploy Betynz Product

on:
  push:
    branches: [main]
    paths-ignore:
      - data.js
      - api-status.json
      - prediction-locks.json
      - results-history.json
      - scripts/data.js
      - scripts/*.json
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write


concurrency:
  group: betynz-code-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check_live_board:
    name: Check for a verified live board
    runs-on: ubuntu-latest
    outputs:
      live_board: ${{ steps.board.outputs.live_board }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Check or recover verified live data
        id: board
        shell: bash
        run: |
          if node scripts/ensure-live-data.js --restore-history --require-live; then
            echo "live_board=true" >> "$GITHUB_OUTPUT"
            echo "Verified live board is available. Continuing with a code-only deploy."
          else
            echo "live_board=false" >> "$GITHUB_OUTPUT"
            echo "No verified live board is available. The full Smart Global refresh will run automatically."
          fi

  refresh_live_board:
    name: Fetch live games before deployment
    needs: check_live_board
    if: needs.check_live_board.outputs.live_board != 'true'
    uses: ./.github/workflows/update-data.yml
    secrets: inherit

  build:
    name: Build code with existing live board
    needs: check_live_board
    if: needs.check_live_board.outputs.live_board == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Recover the verified live board
        run: node scripts/ensure-live-data.js --restore-history --require-live
      - name: Validate product
        run: node scripts/validate-product.js
      - name: Build public release
        run: node scripts/build-dist.js
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    if: needs.build.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
