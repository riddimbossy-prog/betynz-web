name: Update Betynz Product Data

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

concurrency:
  group: betynz-data-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate API secrets
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: test -n "$API_FOOTBALL_KEY"
      - name: Create private runtime configuration
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          STATS_API_KEY: ${{ secrets.STATS_API_KEY }}
          DAYS_BACK: ${{ secrets.DAYS_BACK }}
          DAYS_FWD: ${{ secrets.DAYS_FWD }}
        run: |
          cat > scripts/config.txt <<EOF_CONFIG
          API_KEY=${API_FOOTBALL_KEY}
          STATS_API_KEY=${STATS_API_KEY}
          SEASON=$(date -u +%Y)
          DAYS_BACK=${DAYS_BACK:-1}
          DAYS_FWD=${DAYS_FWD:-6}
          LEAGUES=ALL
          MAX_LEAGUES=45
          REQUEST_BUDGET=900
          MAX_PROBES=12
          SLEEP_MS=1500
          ODDS=true
          H2H=false
          STATS=true
          EOF_CONFIG
          cp data.js scripts/data.js
      - name: Fetch fixtures and statistics
        working-directory: scripts
        run: node fetch-data.js
      - name: Enrich with TheStatsAPI
        working-directory: scripts
        env:
          THESTATSAPI_KEY: ${{ secrets.STATS_API_KEY }}
        run: node enrich-xg.js
        continue-on-error: true
      - name: Build locked Olympian snapshot
        run: node scripts/build-snapshot.js
      - name: Validate generated product
        run: node scripts/validate-product.js
      - name: Remove private runtime file
        if: always()
        run: rm -f scripts/config.txt
      - name: Commit generated public data
        run: |
          git config user.name "Betynz Data Bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.js api-status.json prediction-locks.json results-history.json scripts/data.js
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Refresh Betynz product data"
          git pull --rebase
          git push
