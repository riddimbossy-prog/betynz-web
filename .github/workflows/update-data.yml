name: Smart Global Coverage and Deep Enrichment

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */4 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: betynz-pages
  cancel-in-progress: false

env:
  DEEP_MAX_LEAGUES: ${{ vars.DEEP_MAX_LEAGUES || '18' }}
  DEEP_MAX_MATCHES: ${{ vars.DEEP_MAX_MATCHES || '48' }}
  TSA_MAX_MATCHES: ${{ vars.TSA_MAX_MATCHES || '24' }}

jobs:
  refresh:
    name: Cover every league, then deepen the best candidates
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate API secrets
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: |
          if [ -z "$API_FOOTBALL_KEY" ]; then
            echo "API_FOOTBALL_KEY is missing."
            exit 1
          fi

      - name: Create six-day global coverage configuration
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          STATS_API_KEY: ${{ secrets.STATS_API_KEY }}
          CONFIG_DAYS_FWD: ${{ secrets.DAYS_FWD }}
        run: |
          DAYS_FWD_SAFE="${CONFIG_DAYS_FWD:-6}"
          if ! [[ "$DAYS_FWD_SAFE" =~ ^[0-9]+$ ]]; then DAYS_FWD_SAFE=6; fi
          cat > scripts/config.txt <<EOF_CONFIG
          API_KEY=${API_FOOTBALL_KEY}
          STATS_API_KEY=${STATS_API_KEY}
          SEASON=$(date -u +%Y)
          TODAY_ONLY=false
          DAYS_BACK=0
          DAYS_FWD=${DAYS_FWD_SAFE}
          LEAGUES=ALL
          MAX_LEAGUES=0
          REQUEST_BUDGET=2500
          SLEEP_MS=200
          FAST_MODE=true
          ODDS=true
          H2H=false
          STATS=false
          EOF_CONFIG
          cp data.js scripts/data.js

      - name: Discover every league across today and the next six days
        working-directory: scripts
        run: node fetch-data.js

      - name: Promote global coverage board
        run: cp scripts/data.js data.js

      - name: Build adaptive enrichment plan
        run: node scripts/select-enrichment-plan.js

      - name: Create six-day deep-pass configuration
        id: deep_config
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          STATS_API_KEY: ${{ secrets.STATS_API_KEY }}
          CONFIG_DAYS_FWD: ${{ secrets.DAYS_FWD }}
        run: |
          DAYS_FWD_SAFE="${CONFIG_DAYS_FWD:-6}"
          if ! [[ "$DAYS_FWD_SAFE" =~ ^[0-9]+$ ]]; then DAYS_FWD_SAFE=6; fi
          LEAGUES=$(node -e "const p=require('./scripts/enrichment-plan.json');process.stdout.write((p.selected.leagueIds||[]).join(','))")
          COUNT=$(node -e "const p=require('./scripts/enrichment-plan.json');process.stdout.write(String((p.selected.leagueIds||[]).length))")
          if [ -z "$LEAGUES" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "No leagues cleared the deep-pass planner."
            exit 0
          fi
          cat > scripts/config.txt <<EOF_CONFIG
          API_KEY=${API_FOOTBALL_KEY}
          STATS_API_KEY=${STATS_API_KEY}
          SEASON=$(date -u +%Y)
          TODAY_ONLY=false
          DAYS_BACK=0
          DAYS_FWD=${DAYS_FWD_SAFE}
          LEAGUES=${LEAGUES}
          MAX_LEAGUES=${COUNT}
          MAX_PROBES=${COUNT}
          REQUEST_BUDGET=2200
          SLEEP_MS=250
          FAST_MODE=false
          ODDS=true
          H2H=true
          STATS=true
          EOF_CONFIG
          cp data.js scripts/data.js
          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "Deepening ${COUNT} leagues: ${LEAGUES}"

      - name: Fetch deep team, league-trend and H2H evidence
        if: steps.deep_config.outputs.enabled == 'true'
        working-directory: scripts
        run: node fetch-data.js

      - name: Merge deep evidence into the global board
        if: steps.deep_config.outputs.enabled == 'true'
        run: node scripts/merge-enriched-data.js

      - name: Keep scripts data synchronized when deep pass is empty
        if: steps.deep_config.outputs.enabled != 'true'
        run: cp data.js scripts/data.js

      - name: Add priority xG, market movement and near-kickoff lineups
        if: ${{ secrets.STATS_API_KEY != '' }}
        env:
          TSA_MAX_MATCHES: ${{ env.TSA_MAX_MATCHES }}
        working-directory: scripts
        run: node enrich-xg.js

      - name: Promote final enriched board
        run: cp scripts/data.js data.js

      - name: Build Olympian prediction snapshot
        run: node scripts/build-snapshot.js

      - name: Verify six-day coverage and deep evidence
        env:
          CONFIG_DAYS_FWD: ${{ secrets.DAYS_FWD }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const vm = require('vm');
          const context = { window: {} };
          vm.createContext(context);
          vm.runInContext(fs.readFileSync('data.js', 'utf8'), context);
          if (context.window.BETYNZ_DEMO === true) throw new Error('Generated board is still demo data.');
          const matches = Array.isArray(context.window.MATCHES) ? context.window.MATCHES : [];
          const byDate = new Map();
          for (const match of matches) {
            const date = String(match.matchDate || match.kickoff || '').slice(0, 10) || 'Undated';
            if (!byDate.has(date)) byDate.set(date, []);
            byDate.get(date).push(match);
          }
          const dates = [...byDate.keys()].sort();
          const leagues = new Set(matches.map(m => String(m.leagueId ?? m.league)).filter(Boolean));
          const deep = matches.filter(m => m.enrichmentTier === 'deep');
          const stats = deep.filter(m => m.statsReal);
          const trends = deep.filter(m => m.leagueTrends && m.leagueTrends.sample);
          const h2h = deep.filter(m => m.h2h && m.h2h.played);
          const xg = matches.filter(m => m.xgReal);
          console.log(`Coverage: ${matches.length} fixtures across ${leagues.size} leagues and ${dates.length} active date(s).`);
          for (const date of dates) console.log(`  ${date}: ${byDate.get(date).length} fixtures`);
          console.log(`Deep evidence: ${deep.length} fixtures; stats=${stats.length}, trends=${trends.length}, h2h=${h2h.length}, xG=${xg.length}.`);
          if (!matches.length) console.log('No fixtures were returned for the requested date window; publishing an honest empty board.');
          if (dates.length === 1) console.log('Warning: only one active fixture date was returned by the API inside the requested window.');
          NODE

      - name: Validate generated product
        run: node scripts/validate-product.js

      - name: Build public website
        run: node scripts/build-dist.js

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload adaptive live website artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Archive generated public data
        continue-on-error: true
        run: |
          rm -f scripts/config.txt
          if git ls-files --error-unmatch scripts/config.txt >/dev/null 2>&1; then
            git restore --staged --worktree scripts/config.txt || true
          fi
          git config user.name "Betynz Data Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A -- data.js api-status.json prediction-locks.json results-history.json scripts/data.js scripts/*.json
          if git diff --cached --quiet; then
            echo "No public data changes to archive."
            exit 0
          fi
          git commit -m "Refresh Betynz adaptive live board"
          for attempt in 1 2 3; do
            git fetch origin main
            if git rebase origin/main && git push origin HEAD:main; then
              exit 0
            fi
            git rebase --abort || true
            sleep $((attempt * 3))
          done
          echo "Archive push failed; the Pages artifact is already ready for deployment."
          exit 1

      - name: Remove private runtime configuration
        if: always()
        run: rm -f scripts/config.txt

  deploy:
    name: Deploy adaptive Betynz website
    needs: refresh
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
