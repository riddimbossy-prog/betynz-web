name: Refresh Priority Evidence

on:
  workflow_dispatch:
  schedule:
    - cron: "41 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: betynz-pages
  cancel-in-progress: false

env:
  DEEP_MAX_LEAGUES: ${{ vars.DEEP_MAX_LEAGUES || '12' }}
  DEEP_MAX_MATCHES: ${{ vars.DEEP_MAX_MATCHES || '24' }}
  TSA_MAX_MATCHES: ${{ vars.TSA_MAX_MATCHES || '12' }}
  REBEL_ODDS_MAX_MATCHES: ${{ vars.REBEL_ODDS_MAX_MATCHES || '36' }}

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Recover the last verified board before enrichment
        run: node scripts/ensure-live-data.js --restore-history

      - name: Build current priority plan
        run: node scripts/select-enrichment-plan.js

      - name: Create private TheStatsAPI configuration
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          STATS_API_KEY: ${{ secrets.STATS_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          if [ -z "$STATS_API_KEY" ]; then
            echo "STATS_API_KEY is missing; no priority enrichment can run."
            exit 1
          fi
          cat > scripts/config.txt <<EOF_CONFIG
          API_KEY=${API_FOOTBALL_KEY}
          STATS_API_KEY=${STATS_API_KEY}
          ODDS_API_KEY=${ODDS_API_KEY}
          SEASON=$(date -u +%Y)
          EOF_CONFIG
          cp data.js scripts/data.js

      - name: Refresh xG, odds movement and confirmed lineups for priority fixtures
        working-directory: scripts
        run: node enrich-xg.js

      - name: Refresh persistent Rebel bookmaker movement
        working-directory: scripts
        env:
          REBEL_ODDS_MAX_MATCHES: ${{ env.REBEL_ODDS_MAX_MATCHES }}
        run: node enrich-rebel-odds.js

      - name: Promote refreshed priority evidence
        run: cp scripts/data.js data.js

      - name: Rebuild and validate product
        run: |
          node scripts/build-snapshot.js
          node scripts/validate-product.js
          node scripts/build-dist.js

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Archive priority evidence
        continue-on-error: true
        run: |
          rm -f scripts/config.txt
          if git ls-files --error-unmatch scripts/config.txt >/dev/null 2>&1; then
            git restore --staged --worktree scripts/config.txt || true
          fi
          git config user.name "Betynz Evidence Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A -- data.js api-status.json prediction-locks.json results-history.json scripts/data.js scripts/*.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Refresh Betynz priority evidence"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main

      - if: always()
        run: rm -f scripts/config.txt

  deploy:
    needs: refresh
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
